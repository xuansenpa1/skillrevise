services:
  main:
    build:
      context: ${CONTEXT_DIR}
    image: ${MAIN_IMAGE_NAME}
    command: [ "sh", "-c", "sleep infinity" ]
    network_mode: ${NETWORK_MODE:-bridge}
    environment:
      - OPENAI_API_KEY=${SKILL_HARNESS_TASK_OPENAI_API_KEY:-${OPENAI_API_KEY:-}}
      - OPENAI_BASE_URL=${SKILL_HARNESS_TASK_OPENAI_BASE_URL:-${OPENAI_BASE_URL:-}}
      - GEMINI_API_KEY=${SKILL_HARNESS_TASK_GEMINI_API_KEY:-${GEMINI_API_KEY:-}}
      - ANTHROPIC_API_KEY=${SKILL_HARNESS_TASK_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}
      - ANTHROPIC_BASE_URL=${SKILL_HARNESS_TASK_ANTHROPIC_BASE_URL:-${ANTHROPIC_BASE_URL:-}}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - CLAUDE_CODE_USE_VERTEX=${CLAUDE_CODE_USE_VERTEX:-}
      - CLOUD_ML_REGION=${CLOUD_ML_REGION:-}
      - ANTHROPIC_VERTEX_PROJECT_ID=${ANTHROPIC_VERTEX_PROJECT_ID:-}
    volumes:
      - ${HOST_VERIFIER_LOGS_PATH}:${ENV_VERIFIER_LOGS_PATH}
      - ${HOST_AGENT_LOGS_PATH}:${ENV_AGENT_LOGS_PATH}
    deploy:
      resources:
        limits:
          cpus: ${CPUS:-4}
          memory: ${MEMORY:-4096M}
